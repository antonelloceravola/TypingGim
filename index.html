<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TypingGim</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">TypingGim</p>
          <h1>Adaptive touch typing trainer</h1>
        </div>
        <div class="toolbar" aria-label="Application controls">
          <label class="select-label" for="layoutSelect">Layout</label>
          <select id="layoutSelect"></select>
          <button id="resetProgress" type="button" class="icon-button" title="Reset local progress" aria-label="Reset local progress">↺</button>
        </div>
      </header>

      <main class="workspace">
        <section class="practice-panel" aria-labelledby="lessonTitle">
          <div class="lesson-header">
            <div>
              <p id="phaseLabel" class="phase-label">Phase</p>
              <h2 id="lessonTitle">Loading lesson</h2>
            </div>
            <div class="lesson-actions">
              <button id="prevLesson" type="button" title="Previous lesson (Left Arrow)" aria-label="Previous lesson, Left Arrow">
                <span aria-hidden="true">‹</span>
                <kbd>←</kbd>
              </button>
              <button id="repeatLesson" type="button" title="Repeat exercise (Up or Down Arrow)" aria-label="Repeat exercise, Up or Down Arrow">
                <span>Repeat</span>
                <kbd>↑↓</kbd>
              </button>
              <button id="nextLesson" type="button" title="Next lesson (Right Arrow)" aria-label="Next lesson, Right Arrow">
                <kbd>→</kbd>
                <span aria-hidden="true">›</span>
              </button>
            </div>
          </div>

          <div id="lessonBanner" class="lesson-banner" aria-live="polite" aria-hidden="true"></div>

          <div class="exercise-meta">
            <span id="stepLabel">Step 1</span>
            <span id="adaptiveHint">Adaptive practice ready</span>
          </div>

          <div id="prompt" class="prompt" aria-live="polite"></div>
          <label class="typing-label" for="typingInput">Type here</label>
          <input id="typingInput" class="typing-input" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text">

          <div class="progress-track" aria-hidden="true">
            <span id="progressBar"></span>
          </div>

          <div class="stats-grid" aria-label="Current statistics">
            <div>
              <span id="accuracyStat">100%</span>
              <small>Accuracy</small>
              <div id="accuracyHistory" class="stat-history" aria-label="Accuracy history"></div>
            </div>
            <div>
              <span id="wpmStat">0</span>
              <small>WPM</small>
              <div id="wpmHistory" class="stat-history" aria-label="WPM history"></div>
            </div>
            <div>
              <span id="cpmStat">0</span>
              <small>CPM</small>
              <div id="cpmHistory" class="stat-history" aria-label="CPM history"></div>
            </div>
            <div>
              <span id="weakKeyStat">-</span>
              <small>Weak key</small>
            </div>
          </div>
        </section>

        <aside class="side-panel" aria-label="Progress and games">
          <section>
            <h2>Learning path</h2>
            <ol id="lessonList" class="lesson-list"></ol>
          </section>
          <section>
            <div class="section-title">
              <h2>Mini game</h2>
              <button id="startGame" type="button">Start</button>
            </div>
            <div id="gameArea" class="game-area">
              <div id="gameMessage">A short challenge appears between lessons.</div>
            </div>
          </section>
        </aside>
      </main>

      <section class="keyboard-zone" aria-label="Visual keyboard">
        <div id="keyboard" class="keyboard"></div>
      </section>
    </div>
    <script>  
      window.TypingGim = {};
      window.TypingGimContent = {
        layouts: [],
        generators: [],
        games: [],
        profiles: [],
        exercises: []
      };
    </script>
    <script src="js/statistics.js"></script>
    <script src="js/generator-loader.js"></script>
    <script src="js/adaptive-engine.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/games-engine.js"></script>
    <script src="content-manifest.js"></script>
    <script src="js/exercise-loader.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
